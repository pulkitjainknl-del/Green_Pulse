<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dark Form</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  background:
  radial-gradient(circle at 25% 25%, rgba(140, 0, 255, 0.3), transparent 50%),
  radial-gradient(circle at 75% 35%, rgba(255, 0, 150, 0.3), transparent 50%),
  radial-gradient(circle at 50% 90%, rgba(0, 120, 255, 0.2), transparent 60%),
  linear-gradient(120deg, #040404, #000000);
}
  /* CONTAINER */
  .gp-form-container {
    width: 90%;
    max-width: 1100px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);

    border-radius: 25px;
    padding: 40px;

    display: flex;
    gap: 40px;

    box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* LEFT */
  .gp-form-left {
    width: 30%;
    color: white;
  }

  .gp-form-left h1 {
    font-size: 42px;
    line-height: 1.2;
  }

  /* RIGHT */
  .gp-form-right {
    width: 70%;
  }

  .gp-form label {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 6px;
    display: block;
  }

  /* INPUTS */
  input, select, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.06);
    color: white;

    margin-bottom: 20px;
    transition: 0.25s ease;
  }

  input::placeholder,
  textarea::placeholder {
    color: #777;
  }

  /* FOCUS */
  input:focus,
  select:focus,
  textarea:focus {
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 0 1px rgba(123,92,255,0.5);
  }

  /* ROW */
  .gp-row {
    display: flex;
    gap: 20px;
  }

  .gp-row > div {
    flex: 1;
  }

  /* TEXTAREA */
  textarea {
    height: 110px;
    resize: none;
  }

  /* UPLOAD */
  .gp-upload {
    border: 1px dashed rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 12px;
    color: #888;
    margin-bottom: 25px;
    transition: 0.3s;
  }

  .gp-upload:hover {
    border-color: #7b5cff;
    color: white;
  }

  /* BUTTON */
  .gp-submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;

    background: linear-gradient(90deg, #7b5cff, #ff4ecd);
    color: white;
    font-size: 16px;

    cursor: pointer;
    transition: 0.3s;
  }

  .gp-submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(123,92,255,0.4);
  }

  /* FOOTER */
  .gp-footer-text {
    font-size: 12px;
    color: #777;
    margin-top: 15px;
    text-align: center;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .gp-form-container {
      flex-direction: column;
    }

    .gp-form-left,
    .gp-form-right {
      width: 100%;
    }
  }

  </style>
</head>

<body>

  <div class="gp-form-container">

    <!-- LEFT -->
    <div class="gp-form-left">
      <h1>Fill out<br>the form</h1>
    </div>

    <!-- RIGHT -->
    <div class="gp-form-right">

      <form class="gp-form">

        <label>Subject</label>
        <input type="text" placeholder="Enter subject">

        <div class="gp-row">
          <div>
            <label>Country</label>
            <select>
              <option>Select country</option>
            </select>
          </div>

          <div>
            <label>Name</label>
            <input type="text" placeholder="Enter your full name">
          </div>
        </div>

        <div class="gp-row">
          <div>
            <label>Phone number</label>
            <input type="text" placeholder="Phone number">
          </div>

          <div>
            <label>Email</label>
            <input type="email" placeholder="Enter email">
          </div>
        </div>

        <label>Comment</label>
        <textarea placeholder="Write a few words about it"></textarea>

        <div class="gp-upload">
          Attach a file
        </div>

        <button class="gp-submit-btn"> <a href="home.html" style="text-decoration: none; color: wheat;">Submit form</a></button>

        <p class="gp-footer-text">
          Visit our Privacy Policy to learn how we collect, use, and share personal information
        </p>

      </form>

    </div>

  </div>

</body>
</html>
